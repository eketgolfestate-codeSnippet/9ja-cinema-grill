<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Loading Screen</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

    <style>
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;

            background: linear-gradient(rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.8)),
                url(/img/cinema.jpg);

            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;

            display: flex;
            flex-direction: column;
            /* IMPORTANT FIX */
            justify-content: flex-start;
            /* push content from top */
            align-items: center;

            padding-top: 80px;
            /* space from top */
            gap: 40px;
            /* space between text and loader */

            z-index: 9999;
        }

        /* Title */
        .text-holder h1 {
            color: rgb(18, 209, 18);
            font-size: 3.5rem;
            font-weight: bolder;
            text-align: center;
            font-family: "Inter", sans-serif;
        }

        /* Spinner wrapper */
        .loader-wrapper {
            position: relative;
            width: 140px;
            height: 140px;
        }

        /* Spinner */
        .loader {
            position: absolute;
            width: 140px;
            height: 140px;
            border: 12px solid rgba(255, 255, 255, 0.2);
            border-top: 12px solid #dc3545;
            border-radius: 50%;
            animation: spin 1.5s linear infinite;
        }

        /* Glow */
        .loader::after {
            content: "";
            position: absolute;
            top: -5px;
            left: -5px;
            right: -5px;
            bottom: -5px;
            border-radius: 50%;
            box-shadow: inset 0 0 15px #dc3545;
        }

        /* Center Image */
        .logo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);

            width: 100px;
            height: 100px;
            object-fit: contain;

            border-radius: 50%;
            background: #fff;
            padding: 5px;
        }

        h4{
            color: rgb(19, 189, 19);
            font-family: "Inter", sans-serif;
            font-size: 2rem;
        }


        /* Animation */
        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <!-- Loading Screen -->
    <div class="loading-screen" id="loadingScreen">

        <div class="text-holder">
            <h1>Welcome to <span class="new">9ja Cinemas Grill</span></h1>
        </div>

        <div class="loader-wrapper">
            <div class="loader"></div>

            <!-- Your Logo -->
            <img src="/img/cinemalogo.jpeg" alt="Logo" class="logo">
        </div>
        <h4>please wait....</h4>

    </div>

    <script>
        // Wait 5 seconds then open dashboard
        setTimeout(function(){
            window.location.href = "index.html";
        }, 10000);
        // </script>

</body>

</html>
