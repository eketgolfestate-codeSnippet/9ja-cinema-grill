<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9ja Cinemas Grill | Welcome</title>
    <link rel="shortcut icon" href="/img//cinemalogo.jpeg" type="image/x-icon">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Inter", sans-serif;
            overflow: hidden;
            background: #000;
        }

        .loading-screen {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100vh;
            background:
                linear-gradient(rgba(0, 0, 0, 0.78), rgba(0, 0, 0, 0.82)),
                url("./img/cinema.jpg") center center / cover no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 9999;
            opacity: 1;
            visibility: visible;
            transition: opacity 0.9s ease, visibility 0.9s ease;
        }

        .loading-screen.fade-out {
            opacity: 0;
            visibility: hidden;
        }

        .loading-content {
            text-align: center;
            max-width: 700px;
            width: 100%;
        }

        .welcome-title {
            color: #fff;
            font-size: 3.2rem;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 15px;
            text-shadow: 0 8px 25px rgba(0, 0, 0, 0.45);
        }

        .welcome-title span {
            color: #22c55e;
        }

        .welcome-subtitle {
            color: rgba(255, 255, 255, 0.82);
            font-size: 1.05rem;
            margin-bottom: 35px;
            letter-spacing: 0.3px;
        }

        .loader-wrapper {
            position: relative;
            width: 165px;
            height: 165px;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* outer rotating ring */
        .loader-ring {
            position: absolute;
            width: 165px;
            height: 165px;
            border-radius: 50%;
            border: 12px solid rgba(255, 255, 255, 0.12);
            border-top: 12px solid #e11d48;
            border-right: 12px solid #f59e0b;
            animation: spin 1.4s linear infinite;
            box-shadow:
                0 0 25px rgba(225, 29, 72, 0.28),
                0 0 45px rgba(245, 158, 11, 0.16);
        }

        /* inner glow ring */
        .loader-ring::after {
            content: "";
            position: absolute;
            inset: 8px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.08);
            box-shadow: inset 0 0 25px rgba(255, 255, 255, 0.05);
        }

        .logo-holder {
            position: relative;
            z-index: 2;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #fff;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow:
                0 0 0 8px rgba(255, 255, 255, 0.05),
                0 0 30px rgba(255, 255, 255, 0.12);
        }

        .logo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            display: block;
        }

        .loading-text {
            color: #22c55e;
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: 0.4px;
            margin-bottom: 10px;
        }

        /* animated dots */
        .dots::after {
            content: "";
            display: inline-block;
            width: 1.2em;
            text-align: left;
            animation: dots 1.4s steps(4, end) infinite;
        }

        .progress-note {
            color: rgba(255, 255, 255, 0.68);
            font-size: 0.95rem;
            margin-top: 10px;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes dots {
            0%   { content: ""; }
            25%  { content: "."; }
            50%  { content: ".."; }
            75%  { content: "..."; }
            100% { content: ""; }
        }

        /* Mobile */
        @media (max-width: 767.98px) {
            .welcome-title {
                font-size: 2.2rem;
            }

            .welcome-subtitle {
                font-size: 0.95rem;
                margin-bottom: 28px;
            }

            .loader-wrapper {
                width: 130px;
                height: 130px;
                margin-bottom: 24px;
            }

            .loader-ring {
                width: 130px;
                height: 130px;
                border-width: 10px;
            }

            .logo-holder {
                width: 78px;
                height: 78px;
            }

            .loading-text {
                font-size: 1.05rem;
            }

            .progress-note {
                font-size: 0.88rem;
            }
        }
    </style>
</head>
<body>

    <div class="loading-screen" id="loadingScreen">
        <div class="loading-content">
            <h1 class="welcome-title">
                Welcome to <span>9ja Cinemas Grill</span>
            </h1>
            <p class="welcome-subtitle">
                Bringing the big-screen experience closer to you — movies, moments and memories.
            </p>

            <div class="loader-wrapper">
                <div class="loader-ring"></div>

                <div class="logo-holder">
                    <img src="./img/cinemalogo.jpeg" alt="9ja Cinemas Grill Logo" class="logo">
                </div>
            </div>

            <p class="loading-text">Please wait<span class="dots"></span></p>
            <p class="progress-note">Loading your cinema experience...</p>
        </div>
    </div>

    <script>
        const loadingScreen = document.getElementById("loadingScreen");

        // Total display time before fade out + redirect
        const displayTime = 9000; // 5 seconds

        setTimeout(() => {
            loadingScreen.classList.add("fade-out");

            setTimeout(() => {
                window.location.href = "dashboard.html"; 
            }, 900);
        }, displayTime);
    </script>

</body>
</html>
